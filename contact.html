<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Joshua Seiden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sidebar (desktop) -->
  <aside class="sidebar">
    <a href="index.html" class="site-name">Joshua<br>Seiden</a>
    <nav>
      <a href="index.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </aside>

  <!-- Mobile header -->
  <header class="mobile-header">
    <a href="index.html" class="mobile-name">Joshua Seiden</a>
    <button class="mobile-menu-btn" id="menu-btn" aria-label="Menu">
      <span></span><span></span>
    </button>
  </header>

  <!-- Mobile nav overlay -->
  <div class="mobile-overlay" id="mobile-overlay">
    <button class="mobile-overlay-close" id="overlay-close" aria-label="Close">
      <span></span><span></span>
    </button>
    <nav class="mobile-overlay-nav">
      <a href="index.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>

  <main class="content">

    <form class="contact-form" name="contact" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="contact">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="form-submit">Send</button>
    </form>

    <footer class="footer">
      © Joshua Seiden, 2025. All rights reserved.
      This site is a showcase for Josh Seiden's photography.
      For the other side of Josh's work, visit <a href="https://joshuaseiden.com" style="color: var(--text-muted);">joshuaseiden.com</a>.
    </footer>

  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const menuBtn = document.getElementById('menu-btn');
      const overlay = document.getElementById('mobile-overlay');
      const overlayClose = document.getElementById('overlay-close');

      menuBtn.addEventListener('click', () => overlay.classList.add('open'));
      overlayClose.addEventListener('click', () => overlay.classList.remove('open'));
      overlay.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => overlay.classList.remove('open'));
      });
    });
  </script>

</body>
</html>
