<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NYC Photo Shows · April 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --ink:         #1a1a1e;
  --paper:       #f6f4f0;
  --paper-dark:  #ece8e1;
  --rule:        #d8d3ca;
  --accent:      #c02818;
  --accent-soft: #f9ecea;
  --muted:       #8a8278;
  --saved:       #1c5c38;
  --saved-soft:  #e6f2ec;
  --seen:        #9a9490;
  --mode-walk:   #1a3a5c;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  font-family: 'Spectral', serif;
  background: var(--paper);
  color: var(--ink);
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ─── HEADER (paper background) ─── */
.site-header {
  flex-shrink: 0;
  background: var(--paper);
  padding: 16px 16px 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.site-header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  letter-spacing: 0.04em;
  line-height: 0.88;
  color: var(--ink);
}

.site-header .tagline {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 12px;
  color: var(--muted);
  margin-top: 7px;
  letter-spacing: 0.01em;
}

/* ─── MODE TOGGLE ─── */
.mode-toggle {
  display: flex;
  border: 1px solid var(--rule);
  flex-shrink: 0;
  margin-top: 6px;
}

.mode-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 0.08em;
  padding: 5px 14px;
  border: none;
  cursor: pointer;
  background: transparent;
  color: #b0aba2;
  transition: all 0.2s ease;
}
.mode-btn + .mode-btn { border-left: 1px solid var(--rule); }
.mode-btn.active[data-mode="plan"] { background: var(--ink);      color: var(--paper); }
.mode-btn.active[data-mode="walk"] { background: var(--mode-walk); color: #fff; }

/* ─── MODE BAR ─── */
.mode-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 0 10px;
  border-top: 1px solid var(--rule);
  margin-top: 12px;
}

.mode-bar .mode-label {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 12px;
  color: var(--muted);
}
.mode-bar .mode-hint {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 12px;
  color: #b8b2a8;
}
.closing-legend {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 11px;
  color: var(--accent);
}
.pulse-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.mode-bar .saved-count {
  margin-left: auto;
  font-family: 'Spectral', serif;
  font-size: 11px;
  font-weight: 500;
  color: #5aaa78;
}

/* ─── FILTER BAR ─── */
.filter-bar {
  display: flex;
  gap: 5px;
  padding: 8px 14px;
  overflow-x: auto;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  scrollbar-width: none;
  flex-shrink: 0;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-chip {
  flex-shrink: 0;
  padding: 4px 11px;
  border: 1px solid var(--rule);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
  border-radius: 1px;
  transition: all 0.15s;
  line-height: 1.4;
}
.filter-chip.active              { background: var(--ink);    color: var(--paper); border-color: var(--ink); }
.filter-chip.closing-chip.active { background: var(--accent); border-color: var(--accent); }
.filter-chip.saved-chip.active   { background: var(--saved);  border-color: var(--saved); }

/* ─── SCROLLABLE BODY ─── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* ─── NEIGHBORHOOD HEADER ─── */
.neighborhood-header {
  display: flex;
  align-items: stretch;
  background: var(--paper-dark);
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  z-index: 50;
}
.neighborhood-swatch { width: 5px; flex-shrink: 0; }
.neighborhood-inner {
  flex: 1;
  padding: 9px 14px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.neighborhood-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.06em;
  flex: 1;
  color: var(--ink);
}
.neighborhood-count {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 11px;
  color: var(--muted);
  align-self: center;
}

/* ─── SHOW CARD (image-forward, 3:2) ─── */
.show-card {
  position: relative;
  width: 100%;
  aspect-ratio: 3/2;
  overflow: hidden;
  display: block;
  border-bottom: 1px solid rgba(0,0,0,0.18);
  cursor: pointer;
  background: var(--paper-dark);
}

.show-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}
.show-card:active img { transform: scale(1.03); }
.show-card.is-seen img { filter: grayscale(0.7) brightness(0.65); }

/* gradient overlay — always present, makes text readable even without image */
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 28%,
    rgba(8,8,8,0.55) 62%,
    rgba(8,8,8,0.94) 100%
  );
}

/* closing-soon: left red stripe */
.show-card.closing-soon::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--accent);
  z-index: 3;
}

/* saved: top green stripe */
.show-card.is-saved::before {
  content: '';
  position: absolute;
  left: 0; top: 0; right: 0;
  height: 3px;
  background: var(--saved);
  z-index: 3;
}

/* seen: checkmark circle top-left */
.seen-overlay {
  display: none;
  position: absolute;
  top: 12px; left: 12px;
  z-index: 4;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: 1.5px solid rgba(255,255,255,0.4);
  align-items: center; justify-content: center;
  font-size: 14px; color: rgba(255,255,255,0.8);
  backdrop-filter: blur(4px);
}
.show-card.is-seen .seen-overlay { display: flex; }

/* text overlaid at card bottom */
.card-text {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 13px 14px 14px;
  z-index: 2;
}

.urgent-badge {
  display: inline-block;
  background: var(--accent); color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 0.1em;
  padding: 2px 7px;
  margin-bottom: 4px;
}

.ongoing-badge {
  display: inline-block;
  background: rgba(28,92,56,0.75); color: #9eeabc;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: 0.1em;
  padding: 2px 7px;
  margin-bottom: 4px;
}

.card-artist {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.04em;
  line-height: 1;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.show-card.is-seen .card-artist { opacity: 0.5; }

.card-show-title {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: rgba(255,255,255,0.72);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 8px;
}

.card-gallery {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.45);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.card-close-wrap { text-align: right; flex-shrink: 0; margin-left: 8px; }
.card-close-label {
  display: block;
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  line-height: 1;
  margin-bottom: 1px;
}
.card-close-date {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 0.04em;
  line-height: 1;
  color: rgba(255,255,255,0.68);
}
.show-card.closing-soon .card-close-label,
.show-card.closing-soon .card-close-date { color: #ff8070; }

/* save button — glassy circle top-right */
.save-btn {
  position: absolute;
  right: 12px; top: 12px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,0.38);
  border: 1.5px solid rgba(255,255,255,0.22);
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: all 0.2s;
  z-index: 4;
}
.save-btn.saved { background: var(--saved); border-color: var(--saved); color: #fff; }

/* ─── WALK MODE ─── */
#walkMode {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
#walkMode.active { display: flex; }

#walkMap { flex: 1; z-index: 1; }

.walk-sheet {
  background: var(--ink);
  color: var(--paper);
  flex-shrink: 0;
  max-height: 50vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.walk-sheet-handle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 10px;
  border-bottom: 1px solid #1e1e1e;
}

.walk-sheet-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 0.1em; color: #666;
}
.walk-sheet-count {
  font-family: 'Spectral', serif;
  font-style: italic; font-size: 12px; color: #5aaa78;
}

.walk-card {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid #1a1a1a;
  gap: 12px; cursor: pointer;
  transition: background 0.15s;
}
.walk-card:active { background: #1a1a1a; }
.walk-card.is-seen { opacity: 0.4; }

.walk-thumb {
  width: 44px; height: 44px;
  flex-shrink: 0; overflow: hidden;
  background: #222;
}
.walk-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.walk-card.is-seen .walk-thumb img { filter: grayscale(1) brightness(0.5); }

.walk-card-info { flex: 1; min-width: 0; }

.walk-artist {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px; letter-spacing: 0.04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--paper); line-height: 1.1;
}
.walk-card.is-seen .walk-artist { color: #444; }

.walk-meta {
  font-family: 'Spectral', serif;
  font-style: italic; font-weight: 300;
  font-size: 11px; color: #555;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}

.seen-btn {
  flex-shrink: 0;
  border: 1.5px solid #2a2a2a;
  background: transparent; color: #555;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 0.08em;
  padding: 4px 9px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap; line-height: 1.4;
}
.seen-btn.is-seen { border-color: #2a2a2a; color: #333; text-decoration: line-through; }

.walk-no-saves {
  padding: 24px 20px; text-align: center;
  font-family: 'Spectral', serif; font-style: italic;
  font-weight: 300; font-size: 13px; color: #444; line-height: 1.8;
}
.walk-no-saves strong {
  display: block;
  font-family: 'Bebas Neue', sans-serif; font-style: normal;
  font-size: 18px; letter-spacing: 0.06em;
  color: #666; margin-bottom: 6px; font-weight: normal;
}

/* ─── MAP POPUP ─── */
.leaflet-popup-content-wrapper {
  background: var(--ink) !important;
  color: var(--paper) !important;
  border-radius: 2px !important;
  padding: 0 !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.45) !important;
}
.leaflet-popup-tip { background: var(--ink) !important; }
.leaflet-popup-content { margin: 0 !important; width: 230px !important; }

.pin-popup { padding: 0; overflow: hidden; }
.pin-popup-img {
  width: 100%; height: 90px;
  object-fit: cover; display: block;
  opacity: 0.85;
}
.pin-popup-body { padding: 10px 12px 12px; }
.pin-popup-artist {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 0.04em;
  line-height: 1.1; color: #fff;
}
.pin-popup-show {
  font-family: 'Spectral', serif;
  font-style: italic; font-weight: 300;
  font-size: 12px; color: #888; margin-top: 2px;
}
.pin-popup-gallery {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 0.07em;
  color: #555; margin-top: 4px;
}
.pin-popup-closing {
  font-family: 'Spectral', serif;
  font-size: 11px; color: #555;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid #1e1e1e;
}
.pin-popup-closing.urgent { color: #d97070; }

/* ─── DETAIL PAGE ─── */
#detailPage {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--paper);
  z-index: 999;
  overflow-y: auto;
  max-width: 480px;
  margin: 0 auto;
}
#detailPage.active {
  display: block;
  animation: slideUp 0.28s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.detail-back {
  position: sticky; top: 0;
  background: var(--ink); color: var(--paper);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; z-index: 10;
  border: none; width: 100%;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 0.1em;
}

.detail-hero {
  width: 100%; aspect-ratio: 4/3;
  background: var(--paper-dark); overflow: hidden;
}
.detail-hero img { width: 100%; height: 100%; object-fit: cover; }

.detail-content { padding: 22px 16px 48px; }

.detail-hood-tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: 'Spectral', serif; font-weight: 400;
  font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.detail-hood-tag .swatch { width: 8px; height: 8px; border-radius: 50%; }

.detail-artist {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px; letter-spacing: 0.03em;
  line-height: 0.95; color: var(--ink);
}

.detail-show-title {
  font-family: 'Spectral', serif;
  font-style: italic; font-weight: 400;
  font-size: 19px; color: var(--muted);
  margin-top: 6px; line-height: 1.3;
}

.detail-divider { height: 1px; background: var(--rule); margin: 18px 0; }

.detail-meta-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 0.12em;
  color: var(--muted); margin-bottom: 3px;
}
.detail-meta-value {
  font-family: 'Spectral', serif; font-size: 14px;
  font-weight: 400; line-height: 1.5; margin-bottom: 14px;
  color: var(--ink);
}
.detail-meta-value.gallery {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 0.08em; font-weight: normal;
}
.detail-meta-value a {
  color: var(--ink); text-decoration: none;
  border-bottom: 1px solid var(--rule);
}

.detail-closing-block {
  padding: 12px 14px;
  border: 1px solid var(--rule);
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 18px;
}
.detail-closing-block.urgent  { border-color: var(--accent); background: var(--accent-soft); }
.detail-closing-block.ongoing { border-color: #a8d5b8; background: #e6f4ec; }

.closing-info .label {
  font-family: 'Spectral', serif; font-style: italic;
  font-weight: 300; font-size: 11px; color: var(--muted);
}
.detail-closing-block.urgent  .closing-info .label { color: var(--accent); }
.detail-closing-block.ongoing .closing-info .label { color: #1c5c38; }

.closing-info .date {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 0.04em;
  margin-top: 2px; line-height: 1;
}
.detail-closing-block.urgent  .closing-info .date { color: var(--accent); }
.detail-closing-block.ongoing .closing-info .date { color: #1c5c38; }

.days-left {
  font-family: 'Spectral', serif; font-style: italic;
  font-size: 12px; color: var(--muted); text-align: right;
}
.detail-closing-block.urgent .days-left { color: var(--accent); }

.detail-actions { display: flex; gap: 10px; margin-top: 22px; }
.detail-save-btn, .detail-seen-btn {
  flex: 1; padding: 13px;
  border: 1.5px solid var(--rule);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 0.1em;
  cursor: pointer; background: transparent;
  color: var(--ink); transition: all 0.2s;
}
.detail-save-btn.saved { background: var(--saved); border-color: var(--saved); color: #fff; }
.detail-seen-btn.seen  { background: var(--paper-dark); border-color: var(--rule); color: var(--seen); text-decoration: line-through; }

.you-are-here {
  width: 16px; height: 16px; border-radius: 50%;
  background: #3a8fdd; border: 3px solid white;
  box-shadow: 0 0 0 3px rgba(58,143,221,0.3);
}
.map-pin { cursor: pointer; }

@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

.empty-state {
  padding: 40px 20px; text-align: center;
  font-family: 'Spectral', serif; font-style: italic;
  font-weight: 300; color: var(--muted);
  font-size: 14px; line-height: 1.8;
}
</style>
</head>
<body>
<div id="app">

  <header class="site-header">
    <div class="header-top">
      <div>
        <h1>NYC<br>Photo Shows</h1>
        <p class="tagline">Current exhibitions — April 2026</p>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="plan" onclick="setMode('plan')">Plan</button>
        <button class="mode-btn"        data-mode="walk" onclick="setMode('walk')">Walk</button>
      </div>
    </div>
    <div class="mode-bar" id="modeBar">
      <span class="mode-label">Planning</span>
      <span class="mode-hint">— add shows to your visit</span>
      <span class="closing-legend"><span class="pulse-dot"></span>closing within 7 days</span>
    </div>
  </header>

  <div id="planMode" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
    <div class="filter-bar" id="filterBar"></div>
    <div class="scroll-body" id="listingPage"></div>
  </div>

  <div id="walkMode">
    <div id="walkMap"></div>
    <div class="walk-sheet">
      <div class="walk-sheet-handle">
        <span class="walk-sheet-title">Your Visit</span>
        <span class="walk-sheet-count" id="walkSheetCount"></span>
      </div>
      <div id="walkList"></div>
    </div>
  </div>

</div>

<div id="detailPage">
  <button class="detail-back" onclick="closeDetail()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M9 2.5L4 7L9 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back to listings
  </button>
  <div id="detailContent"></div>
</div>

<script>
const TODAY = new Date('2026-04-25');
const NEIGHBORHOODS = {
  "Chelsea": {
    "color": "#344e8a"
  },
  "Midtown": {
    "color": "#1a6a6a"
  },
  "Upper East Side": {
    "color": "#5a3a7a"

let currentMode  = 'plan';
let activeFilter = 'all';
let savedIds = new Set(JSON.parse(localStorage.getItem('gallery-savedIds') || '[]'));
let seenIds  = new Set(JSON.parse(localStorage.getItem('gallery-seenIds')  || '[]'));
let walkMap  = null;
let walkMarkers = {};

function saveState() {
  localStorage.setItem('gallery-savedIds', JSON.stringify([...savedIds]));
  localStorage.setItem('gallery-seenIds',  JSON.stringify([...seenIds]));
}

function daysUntil(d) {
  if (!d) return null;
  return Math.round((new Date(d) - TODAY) / 86400000);
}

function fmtDate(s) {
  return new Date(s + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function mapsUrl(address) {
  return 'https://maps.apple.com/?address=' + encodeURIComponent(address);
}

// ─── FILTER BAR ───
function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  const hoods = [];
  SHOWS.forEach(s => { if (!hoods.includes(s.neighborhood)) hoods.push(s.neighborhood); });
  bar.innerHTML =
    '<button class="filter-chip active" data-filter="all">All</button>' +
    '<button class="filter-chip closing-chip" data-filter="closing">Closing Soon</button>' +
    '<button class="filter-chip saved-chip" data-filter="saved">My Visit</button>' +
    hoods.map(n => `<button class="filter-chip" data-filter="${n}">${n}</button>`).join('');

  bar.addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    bar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    renderList();
  });
}

// ─── MODE ───
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  const modeBar = document.getElementById('modeBar');
  if (mode === 'plan') {
    document.getElementById('planMode').style.display = 'flex';
    document.getElementById('walkMode').classList.remove('active');
    modeBar.innerHTML =
      '<span class="mode-label">Planning</span>' +
      '<span class="mode-hint">— add shows to your visit</span>' +
      '<span class="closing-legend"><span class="pulse-dot"></span>closing within 7 days</span>';
    renderList();
  } else {
    document.getElementById('planMode').style.display = 'none';
    document.getElementById('walkMode').classList.add('active');
    modeBar.innerHTML =
      '<span class="mode-label" style="color:#5aaa78">Walking</span>' +
      '<span class="mode-hint" style="color:#b0b0b0">— mark shows as seen</span>' +
      '<span class="saved-count" id="savedCount"></span>';
    renderWalkMode();
  }
  updateSavedCount();
}

function updateSavedCount() {
  const el = document.getElementById('savedCount');
  if (el) el.textContent = savedIds.size > 0 ? `${savedIds.size} saved` : '';
}

// ─── PLAN / LIST ───
function visibleShows() {
  return SHOWS.filter(s => {
    if (s.isOngoing) return true;
    const d = daysUntil(s.closing);
    return d !== null && d >= 0;
  });
}

function getFilteredShows() {
  return visibleShows().filter(s => {
    if (activeFilter === 'all')     return true;
    if (activeFilter === 'closing') return !s.isOngoing && daysUntil(s.closing) <= 7;
    if (activeFilter === 'saved')   return savedIds.has(s.id);
    return s.neighborhood === activeFilter;
  });
}

function renderList() {
  const page  = document.getElementById('listingPage');
  const shows = getFilteredShows();
  page.innerHTML = '';

  if (shows.length === 0) {
    page.innerHTML = '<div class="empty-state">No shows match this filter.</div>';
    return;
  }

  const groups = {};
  const hoodOrder = [];
  shows.forEach(s => {
    if (!groups[s.neighborhood]) { groups[s.neighborhood] = []; hoodOrder.push(s.neighborhood); }
    groups[s.neighborhood].push(s);
  });

  hoodOrder.forEach((hood, i) => {
    const nb = NEIGHBORHOODS[hood] || {color:'#444'};
    const hoodShows = groups[hood];
    const sec = document.createElement('section');
    sec.style.cssText = `opacity:0;transform:translateY(12px);animation:fadeIn 0.38s ease ${i * 0.06}s forwards`;
    sec.innerHTML =
      `<div class="neighborhood-header">` +
        `<div class="neighborhood-swatch" style="background:${nb.color}"></div>` +
        `<div class="neighborhood-inner">` +
          `<span class="neighborhood-name">${hood}</span>` +
          `<span class="neighborhood-count">${hoodShows.length} show${hoodShows.length !== 1 ? 's' : ''}</span>` +
        `</div>` +
      `</div>` +
      hoodShows.map(s => renderCard(s)).join('');
    page.appendChild(sec);
  });
}

function renderCard(s) {
  const days   = s.isOngoing ? null : daysUntil(s.closing);
  const urgent = !s.isOngoing && days !== null && days <= 7;
  const saved  = savedIds.has(s.id);
  const seen   = seenIds.has(s.id);

  const topBadge = urgent
    ? '<div class="urgent-badge">Closing Soon</div>'
    : s.isOngoing ? '<div class="ongoing-badge">Ongoing</div>' : '';

  const imgHtml = s.thumb
    ? `<img src="${s.thumb}" alt="${s.artist}" loading="lazy" onerror="this.style.display='none'">`
    : '';

  let closeHtml = '';
  if (!s.isOngoing && s.closing) {
    closeHtml =
      `<div class="card-close-wrap">` +
        `<span class="card-close-label">closes</span>` +
        `<span class="card-close-date">${fmtDate(s.closing)}</span>` +
      `</div>`;
  }

  return (
    `<div class="show-card ${urgent?'closing-soon':''} ${saved?'is-saved':''} ${seen?'is-seen':''}"` +
        ` onclick="openDetail('${s.id}')">` +
      imgHtml +
      `<div class="card-overlay"></div>` +
      `<div class="seen-overlay">✓</div>` +
      `<div class="card-text">` +
        topBadge +
        `<div class="card-artist">${s.artist}</div>` +
        `<div class="card-show-title">${s.title}</div>` +
        `<div class="card-meta">` +
          `<div class="card-gallery">${s.gallery}</div>` +
          closeHtml +
        `</div>` +
      `</div>` +
      `<button class="save-btn ${saved?'saved':''}"` +
              ` onclick="toggleSave(event,'${s.id}')"` +
              ` title="${saved?'Remove from visit':'Add to visit'}">${saved?'♦':'◇'}</button>` +
    `</div>`
  );
}

function toggleSave(e, id) {
  e.stopPropagation();
  if (savedIds.has(id)) { savedIds.delete(id); } else { savedIds.add(id); }
  saveState(); renderList(); updateSavedCount();
}

function toggleSeen(id) {
  if (seenIds.has(id)) { seenIds.delete(id); } else { seenIds.add(id); }
  saveState();
  if (currentMode === 'walk') { renderWalkList(); updateWalkMarkers(); }
  else { renderList(); }
}

// ─── WALK MODE ───
function renderWalkMode() {
  renderWalkList();
  initOrUpdateWalkMap();
}

function renderWalkList() {
  const container = document.getElementById('walkList');
  const countEl   = document.getElementById('walkSheetCount');

  if (savedIds.size === 0) {
    container.innerHTML = '<div class="walk-no-saves"><strong>No shows saved</strong>Switch to Plan mode and tap ◇ to add shows to your visit.</div>';
    if (countEl) countEl.textContent = '';
    return;
  }

  const saved  = SHOWS.filter(s => savedIds.has(s.id));
  const unseen = saved.filter(s => !seenIds.has(s.id));
  const seen   = saved.filter(s =>  seenIds.has(s.id));
  if (countEl) countEl.textContent = `${unseen.length} remaining`;

  container.innerHTML = [...unseen, ...seen].map(s => {
    const isSeen = seenIds.has(s.id);
    const thumbHtml = s.thumb
      ? `<img src="${s.thumb}" alt="${s.artist}" loading="lazy">`
      : '';
    return (
      `<div class="walk-card ${isSeen?'is-seen':''}" onclick="openDetail('${s.id}')">` +
        `<div class="walk-thumb">${thumbHtml}</div>` +
        `<div class="walk-card-info">` +
          `<div class="walk-artist">${s.artist}</div>` +
          `<div class="walk-meta">${s.gallery} · ${s.neighborhood}</div>` +
        `</div>` +
        `<button class="seen-btn ${isSeen?'is-seen':''}"` +
                ` onclick="event.stopPropagation();toggleSeen('${s.id}')">` +
          `${isSeen?'Seen':'Mark Seen'}` +
        `</button>` +
      `</div>`
    );
  }).join('');
}

// ─── WALK MAP ───
function initOrUpdateWalkMap() {
  if (!walkMap) {
    walkMap = L.map('walkMap', {zoomControl:false, attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(walkMap);
    L.control.attribution({prefix:'© OpenStreetMap © Carto', position:'bottomright'}).addTo(walkMap);
    L.control.zoom({position:'topright'}).addTo(walkMap);

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        const youIcon = L.divIcon({html:'<div class="you-are-here"></div>', iconSize:[16,16], iconAnchor:[8,8], className:''});
        L.marker([pos.coords.latitude, pos.coords.longitude], {icon:youIcon}).addTo(walkMap)
          .bindPopup('<div class="pin-popup"><div class="pin-popup-body"><div class="pin-popup-artist">You are here</div></div></div>');
      });
    }
  }
  updateWalkMarkers();
}

function makePinIcon(color, faded) {
  const svg =
    `<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg" style="opacity:${faded?0.3:1}">` +
    `<path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="${color}"/>` +
    `<circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>` +
    `</svg>`;
  return L.divIcon({html:svg, iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-36], className:'map-pin'});
}

function updateWalkMarkers() {
  Object.values(walkMarkers).forEach(m => walkMap.removeLayer(m));
  walkMarkers = {};

  const saved = SHOWS.filter(s => savedIds.has(s.id) && s.lat !== null && s.lng !== null);
  if (saved.length === 0) { walkMap.setView([40.740, -74.000], 13); return; }

  saved.forEach(s => {
    const color  = (NEIGHBORHOODS[s.neighborhood] || {}).color || '#444';
    const isSeen = seenIds.has(s.id);
    const days   = s.isOngoing ? null : daysUntil(s.closing);
    const urgent = days !== null && days <= 7;
    const closingLine = s.isOngoing
      ? 'Ongoing'
      : `Closes ${fmtDate(s.closing)}${urgent ? ' — ' + days + (days===1?' day':' days') + ' left' : ''}`;

    const imgHtml = s.thumb
      ? `<img class="pin-popup-img" src="${s.thumb}" alt="${s.artist}">`
      : '';

    const marker = L.marker([s.lat, s.lng], {icon:makePinIcon(color, isSeen)})
      .addTo(walkMap)
      .bindPopup(
        `<div class="pin-popup">` +
          imgHtml +
          `<div class="pin-popup-body">` +
            `<div class="pin-popup-artist">${s.artist}</div>` +
            `<div class="pin-popup-show">${s.title}</div>` +
            `<div class="pin-popup-gallery">${s.gallery}</div>` +
            `<div class="pin-popup-closing ${urgent?'urgent':''}">${closingLine}</div>` +
          `</div>` +
        `</div>`
      );
    marker.on('click', () => marker.openPopup());
    walkMarkers[s.id] = marker;
  });

  const group = L.featureGroup(Object.values(walkMarkers));
  walkMap.fitBounds(group.getBounds().pad(0.25));
}

// ─── DETAIL ───
function openDetail(id) {
  const s = SHOWS.find(x => x.id === id);
  if (!s) return;
  const nb     = NEIGHBORHOODS[s.neighborhood] || {color:'#444'};
  const days   = s.isOngoing ? null : daysUntil(s.closing);
  const urgent = !s.isOngoing && days !== null && days <= 7;
  const isSaved = savedIds.has(s.id);
  const isSeen  = seenIds.has(s.id);

  let closingBlock = '';
  if (s.isOngoing) {
    closingBlock =
      `<div class="detail-closing-block ongoing">` +
        `<div class="closing-info">` +
          `<span class="label">Closing date</span>` +
          `<div class="date">Ongoing</div>` +
        `</div>` +
      `</div>`;
  } else if (s.closing) {
    const daysLabel = days === 0 ? 'Closes today' : days === 1 ? '1 day left' : `${days} days left`;
    closingBlock =
      `<div class="detail-closing-block ${urgent?'urgent':''}">` +
        `<div class="closing-info">` +
          `<span class="label">${urgent?'⚠ Closing soon':'Closing date'}</span>` +
          `<div class="date">${fmtDate(s.closing)}</div>` +
        `</div>` +
        `<div class="days-left">${daysLabel}</div>` +
      `</div>`;
  }

  const heroHtml = s.thumb
    ? `<div class="detail-hero"><img src="${s.thumb}" alt="${s.artist}"></div>`
    : `<div class="detail-hero"></div>`;

  const hoursHtml = s.hours
    ? `<div class="detail-meta-label">Hours</div><div class="detail-meta-value">${s.hours}</div>`
    : '';

  let websiteHtml = '';
  if (s.website) {
    const url   = s.website.startsWith('http') ? s.website : 'https://' + s.website;
    const label = s.website.replace(/^https?:\/\//, '');
    websiteHtml = `<div class="detail-meta-label">Website</div><div class="detail-meta-value"><a href="${url}" target="_blank">${label}</a></div>`;
  }

  const addrDisplay = (s.address && s.address !== 'Check website')
    ? `<a href="${mapsUrl(s.address + ', New York')}">${s.address}</a>`
    : s.address;

  document.getElementById('detailContent').innerHTML =
    heroHtml +
    `<div class="detail-content">` +
      `<div class="detail-hood-tag">` +
        `<span class="swatch" style="background:${nb.color}"></span>` +
        s.neighborhood +
      `</div>` +
      `<div class="detail-artist">${s.artist}</div>` +
      `<div class="detail-show-title">${s.title}</div>` +
      `<div class="detail-divider"></div>` +
      `<div class="detail-meta-label">Gallery</div>` +
      `<div class="detail-meta-value gallery">${s.gallery}</div>` +
      `<div class="detail-meta-label">Address</div>` +
      `<div class="detail-meta-value">${addrDisplay}</div>` +
      hoursHtml +
      websiteHtml +
      closingBlock +
      `<div class="detail-actions">` +
        `<button class="detail-save-btn ${isSaved?'saved':''}" id="detailSaveBtn" onclick="detailToggleSave('${s.id}')">` +
          `${isSaved?'♦ Saved to Visit':'◇ Add to Visit'}` +
        `</button>` +
        `<button class="detail-seen-btn ${isSeen?'seen':''}" id="detailSeenBtn" onclick="detailToggleSeen('${s.id}')">` +
          `${isSeen?'✓ Seen':'Mark Seen'}` +
        `</button>` +
      `</div>` +
    `</div>`;

  const page = document.getElementById('detailPage');
  page.classList.add('active');
  page.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function detailToggleSave(id) {
  if (savedIds.has(id)) { savedIds.delete(id); } else { savedIds.add(id); }
  saveState(); updateSavedCount();
  const isSaved = savedIds.has(id);
  const btn = document.getElementById('detailSaveBtn');
  if (btn) { btn.className = `detail-save-btn ${isSaved?'saved':''}`; btn.textContent = isSaved?'♦ Saved to Visit':'◇ Add to Visit'; }
  renderList();
}

function detailToggleSeen(id) {
  if (seenIds.has(id)) { seenIds.delete(id); } else { seenIds.add(id); }
  saveState();
  const isSeen = seenIds.has(id);
  const btn = document.getElementById('detailSeenBtn');
  if (btn) { btn.className = `detail-seen-btn ${isSeen?'seen':''}`; btn.textContent = isSeen?'✓ Seen':'Mark Seen'; }
  if (currentMode === 'walk') { renderWalkList(); updateWalkMarkers(); }
}

function closeDetail() {
  const page = document.getElementById('detailPage');
  page.style.transition = 'opacity 0.2s, transform 0.2s';
  page.style.opacity = '0';
  page.style.transform = 'translateY(40px)';
  setTimeout(() => {
    page.classList.remove('active');
    page.style.transition = page.style.opacity = page.style.transform = '';
    document.body.style.overflow = '';
  }, 200);
}

// ─── INIT ───
buildFilterBar();
renderList();
updateSavedCount();
</script>
</body>
